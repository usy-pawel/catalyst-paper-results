<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="300">
  <title>Paper Results</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, Segoe UI, Arial, sans-serif; background:#f7f8fb; color:#18202f; }
    body { margin:0; padding:24px; }
    main { max-width:680px; margin:0 auto; }
    h1 { margin:0 0 6px; font-size:26px; letter-spacing:0; }
    .meta { margin:0 0 18px; color:#536071; font-size:13px; }
    .list { display:grid; gap:10px; }
    .row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:16px; align-items:center; background:#fff; border:1px solid #d9deea; border-radius:8px; padding:14px 16px; }
    strong { display:block; font-size:16px; line-height:1.25; }
    span { display:block; margin-top:3px; color:#536071; font-size:13px; }
    b { font-size:24px; line-height:1; white-space:nowrap; }
    .pos { color:#087443; }
    .neg { color:#b42318; }
    .empty { margin:0; background:#fff; border:1px solid #d9deea; border-radius:8px; padding:16px; color:#536071; }
    footer { margin-top:18px; color:#6b7280; font-size:12px; }
  </style>
</head>
<body>
  <main>
    <h1>Paper Results</h1>

  </main>
</body>
</html>
